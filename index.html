<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مایار طبی لابراتوار | Mayar Medical Laboratory</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #eef2f7 0%, #d9e2ec 100%);
            --card-bg: #ffffff;
            --primary-color: #0b4f6c;
            --secondary-color: #01baef;
            --text-main: #1b2a4a;
            --text-muted: #627d98;
            --whatsapp-color: #20ba5a;
            --shadow-pro: 0 20px 40px rgba(27, 42, 74, 0.07);
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            padding: 15px;
            color: var(--text-main);
            direction: rtl;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            padding: 25px 20px;
            box-shadow: var(--shadow-pro);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .lab-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .animated-icon {
            font-size: 50px;
            margin-bottom: 5px;
        }

        .lab-header h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary-color);
            margin: 5px 0;
        }

        .doctor-name {
            font-size: 15px;
            font-weight: bold;
            color: #d9383a;
            margin: 2px 0 8px 0;
            background: #fff0f0;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 8px;
        }

        .top-phones {
            margin: 5px 0 12px 0;
            font-size: 14px;
            font-weight: bold;
            color: #0b4f6c;
        }

        .top-phones a {
            color: #0b4f6c;
            text-decoration: none;
            background: #f0f4f8;
            padding: 3px 10px;
            border-radius: 6px;
            display: inline-block;
            margin: 3px;
            border: 1px solid #e2e8f0;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin: 0 0 15px 0;
        }

        .address-box {
            background: #eef5fa;
            border-right: 4px solid var(--secondary-color);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            line-height: 1.6;
        }

        .section-title {
            font-size: 16px;
            color: var(--primary-color);
            margin: 25px 0 12px 0;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
            font-weight: bold;
        }

        /* استایل فرم مشخصات مریض */
        .patient-form {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 12px;
            text-align: right;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--primary-color);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 13px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(1, 186, 239, 0.1);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            cursor: pointer;
        }

        .radio-option input {
            width: auto;
            cursor: pointer;
        }

        .test-category {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .cat-title {
            font-size: 13px;
            font-weight: bold;
            color: #ffffff;
            background: var(--primary-color);
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .tests-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .test-item {
            font-size: 11px;
            color: #334e68;
            background: #ffffff;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            text-align: center;
            font-weight: 500;
            transition: all 0.2s;
            display: block;
            user-select: none;
        }

        .test-item.selected {
            background: #eef5fa;
            border: 2px solid var(--secondary-color);
            color: var(--primary-color);
            font-weight: bold;
        }

        .submit-container {
            position: sticky;
            bottom: 0;
            background: white;
            padding: 10px 0;
            border-top: 1px solid #e2e8f0;
            margin: 20px 0;
            text-align: center;
            z-index: 10;
        }

        .btn-submit {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--whatsapp-color) 0%, #1ca34d 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(32, 186, 90, 0.3);
            transition: 0.2s;
        }

        .btn-submit:hover { transform: translateY(-2px); }

        .phone-group {
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 15px;
            background: #fafbfc;
        }

        .phone-group legend {
            font-size: 11px;
            font-weight: bold;
            color: var(--text-muted);
            padding: 0 8px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            margin: 8px 0;
            text-decoration: none;
            color: white;
            border-radius: 10px;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn-phone { background: linear-gradient(135deg, var(--primary-color) 0%, #136a8a 100%); }
        .btn-whatsapp { background: linear-gradient(135deg, var(--whatsapp-color) 0%, #1ca34d 100%); }
        .btn-email { background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%); }

        .lab-footer {
            text-align: center;
            margin-top: 25px;
            border-top: 1px solid #e2e8f0;
            padding-top: 15px;
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
